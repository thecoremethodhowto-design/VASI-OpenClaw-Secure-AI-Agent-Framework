services:
  ollama:
    image: ollama/ollama:0.12.6
    container_name: vasi-ollama-local
    profiles:
      - local-ollama
    expose:
      - "11434"
    environment:
      # Ollama güvenlik ayarları
      OLLAMA_KEEP_ALIVE: 5m
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - vasi-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # GPU kullanımı (opsiyonel)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  vasi-core:
    build: .
    container_name: vasi-sandbox-guard
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
    environment:
      # Varsayilan: Mac/host uzerinde zaten calisan Ollama'yi kullan.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      VASI_LOG_FILE: /tmp/vasi_audit.log
      VASI_NOTES_FILE: NOTES.md
      VASI_CHANNEL_STYLE_FILE: channel_style.md
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      WEB_RADAR_ALLOWLIST: ${WEB_RADAR_ALLOWLIST:-}
      PENDING_ACTION_TTL_SECONDS: ${PENDING_ACTION_TTL_SECONDS:-600}
      GEMINI_DAILY_LIMIT_REQUESTS: ${GEMINI_DAILY_LIMIT_REQUESTS:-60}
      VASI_MODEL_GATEKEEPER: ${VASI_MODEL_GATEKEEPER:-qwen3:30b}
      VASI_MODEL_STRATEJI: ${VASI_MODEL_STRATEJI:-qwen3:30b}
      VASI_MODEL_TEKNIK: ${VASI_MODEL_TEKNIK:-qwen3:30b}
      VASI_MODEL_KOD: ${VASI_MODEL_KOD:-qwen3-coder:30b}
      VASI_MODEL_GORSEL: ${VASI_MODEL_GORSEL:-qwen3:30b}
    restart: unless-stopped
    networks:
      - vasi-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

networks:
  vasi-network:
    driver: bridge

volumes:
  ollama_data:
